<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juicing Passion</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #faf8f3;
      color: #333;
      text-align: center;
      padding: 4rem 1rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      border: 2px solid #d0c5b5;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 0 14px rgba(0,0,0,0.1);
      padding: 2rem;
    }

    h1 {
      color: #d24a1a;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.15rem;
      line-height: 1.6;
      margin: 0.8rem 0;
    }

    .highlight {
      color: #367c4f;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Juicing Passion</h1>
    <p>I love making fresh drinks from carrots, pomegranates, and other vibrant fruits and vegetables.</p>
    <p>Every sip is a small celebration of flavor and health, and I enjoy sharing the joy of juicing.</p>
  </div>
</body>
</html>
